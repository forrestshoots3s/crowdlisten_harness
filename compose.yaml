services:
  harness:
    build: .
    container_name: crowdlisten-harness
    restart: unless-stopped
    ports:
      - "3848:3848"
    env_file:
      - .env
    environment:
      CROWDLISTEN_AGENT_URL: http://172.17.0.1:8000  # Docker bridge -> co-located agent
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3848/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
